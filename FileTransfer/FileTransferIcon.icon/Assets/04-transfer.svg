<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280" role="img">
  <title>FileTransfer — transfer badge</title>
  <desc>Foreground glyph: a tinted glass lens with a top specular highlight and two opposing arrows (top pointing right, bottom pointing left) signalling transfer. Transparent background.</desc>
  <defs>
    <linearGradient id="ftBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D4E8FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#2F6BE6" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <circle cx="220" cy="212" r="44" fill="url(#ftBadge)" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.5"/>
  <ellipse cx="210" cy="186" rx="26" ry="12" fill="#FFFFFF" opacity="0.4"/>
  <line x1="201" y1="204" x2="227" y2="204" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <polygon points="239,204 227,198 227,210" fill="#FFFFFF"/>
  <line x1="239" y1="221" x2="213" y2="221" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <polygon points="201,221 213,215 213,227" fill="#FFFFFF"/>
</svg>
