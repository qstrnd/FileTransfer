<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280" role="img">
  <title>FileTransfer — background lighting</title>
  <desc>Glass treatment for the background: top-left light, specular crown, bottom depth, and a bright bevel rim. Sits above the base, below the document.</desc>
  <defs>
    <clipPath id="ftClip"><rect x="0" y="0" width="280" height="280" rx="66"/></clipPath>
    <linearGradient id="ftGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#ftClip)">
    <ellipse cx="70" cy="56" rx="190" ry="150" fill="#FFFFFF" opacity="0.16"/>
    <ellipse cx="140" cy="-20" rx="170" ry="78" fill="url(#ftGloss)"/>
    <ellipse cx="140" cy="332" rx="210" ry="130" fill="#0B3AAE" opacity="0.35"/>
  </g>
  <rect x="0" y="0" width="280" height="280" rx="66" fill="none" stroke="#FFFFFF" stroke-opacity="0.32" stroke-width="2"/>
</svg>
